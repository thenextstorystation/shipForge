<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TheDeveloper — Cinematic Portfolio</title>
<meta name="description" content="A cinematic portfolio of apps crafted with precision, creativity, and obsessive polish." />
<meta property="og:title" content="TheDeveloper — Cinematic Portfolio" />
<meta property="og:description" content="10+ apps. One unforgettable journey." />
<meta property="og:type" content="website" />
<style>
/* ─────────────────────────────────────────
   DESIGN TOKENS
───────────────────────────────────────── */
:root {
  /* Backgrounds */
  --void:        #020204;
  --deep:        #07070E;
  --surface:     #0D0D18;
  --elevated:    #121220;
  --glass:       rgba(255,255,255,0.025);
  --glass-s:     rgba(255,255,255,0.055);

  /* Accents */
  --plasma:      #7B4FFF;
  --plasma-dim:  #5C35CC;
  --plasma-b:    #9B6FFF;
  --plasma-glow: rgba(123,79,255,0.28);
  --plasma-soft: rgba(123,79,255,0.12);
  --ember:       #FF5C35;
  --ember-dim:   #CC3D20;
  --ember-b:     #FF7A5C;
  --ember-glow:  rgba(255,92,53,0.22);
  --ember-soft:  rgba(255,92,53,0.10);
  --aurora:      #35FFD4;
  --aurora-dim:  #20BFA0;
  --aurora-b:    #6EFFDF;
  --aurora-glow: rgba(53,255,212,0.18);
  --aurora-soft: rgba(53,255,212,0.08);
  --gold:        #E8C97A;
  --gold-dim:    #B89A4A;
  --gold-glow:   rgba(232,201,122,0.20);

  /* Text */
  --t1: #F0EEF8;
  --t2: #9B98B8;
  --t3: #6B6888;
  --tm: #3E3C58;
  --t-plasma: #A07EFF;
  --t-ember:  #FF7A5C;
  --t-aurora: #6EFFDF;
  --t-gold:   #E8C97A;

  /* Borders */
  --b-hair:   rgba(255,255,255,0.04);
  --b-sub:    rgba(255,255,255,0.07);
  --b-def:    rgba(255,255,255,0.11);
  --b-str:    rgba(255,255,255,0.20);
  --b-plasma: rgba(123,79,255,0.38);
  --b-plasma-s:rgba(123,79,255,0.18);
  --b-ember:  rgba(255,92,53,0.32);
  --b-aurora: rgba(53,255,212,0.28);
  --b-gold:   rgba(232,201,122,0.30);

  /* Typography — system stack (no external fonts) */
  --ff-display: system-ui, -apple-system, 'Segoe UI', sans-serif;
  --ff-body:    system-ui, -apple-system, 'Segoe UI', sans-serif;
  --ff-mono:    'Courier New', Courier, monospace;

  /* Radius */
  --r-xs:   4px;
  --r-sm:   8px;
  --r-md:   12px;
  --r-lg:   16px;
  --r-xl:   24px;
  --r-2xl:  32px;
  --r-card: 20px;
  --r-card-lg: 28px;
  --r-icon: 18px;
  --r-pill: 9999px;

  /* Spacing shorthand */
  --nav-h: 72px;
  --pad-x: clamp(20px, 5vw, 80px);

  /* Easing */
  --ease-spring:   cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-cinema:   cubic-bezier(0.22, 1, 0.36, 1);
  --ease-standard: cubic-bezier(0.16, 1, 0.3, 1);
}

/* ─────────────────────────────────────────
   RESET & BASE
───────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }

body {
  background: var(--void);
  color: var(--t1);
  font-family: var(--ff-body);
  line-height: 1.6;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: var(--void); }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--plasma), var(--ember));
  border-radius: var(--r-pill);
}

img { display: block; max-width: 100%; }
a { text-decoration: none; color: inherit; }
button { border: none; background: none; font: inherit; color: inherit; }

/* ─────────────────────────────────────────
   UTILITY CLASSES
───────────────────────────────────────── */
.eyebrow {
  font-family: var(--ff-mono);
  font-size: 0.6875rem;
  font-weight: 500;
  letter-spacing: 0.20em;
  text-transform: uppercase;
  color: var(--t3);
}
.gradient-text {
  background: linear-gradient(90deg, #A07EFF 0%, #FF7A5C 52%, #6EFFDF 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.plasma-text  { color: var(--t-plasma); }
.ember-text   { color: var(--t-ember);  }
.aurora-text  { color: var(--t-aurora); }
.gold-text    { color: var(--t-gold);   }

/* ─────────────────────────────────────────
   AMBIENT BACKGROUND ORBS (CSS only)
───────────────────────────────────────── */
.bg-orbs {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.18;
  animation: orbDrift 18s ease-in-out infinite alternate;
}
.orb-1 {
  width: 600px; height: 600px;
  background: var(--plasma);
  top: -160px; left: -120px;
  animation-duration: 22s;
}
.orb-2 {
  width: 500px; height: 500px;
  background: var(--ember);
  top: 20%; right: -100px;
  animation-duration: 17s;
  animation-delay: -6s;
}
.orb-3 {
  width: 460px; height: 460px;
  background: var(--aurora);
  bottom: 15%; left: 25%;
  animation-duration: 25s;
  animation-delay: -11s;
  opacity: 0.10;
}
.orb-4 {
  width: 340px; height: 340px;
  background: var(--gold);
  bottom: 5%; right: 15%;
  animation-duration: 20s;
  animation-delay: -3s;
  opacity: 0.09;
}
@keyframes orbDrift {
  0%   { transform: translate(0, 0) scale(1); }
  33%  { transform: translate(40px, -30px) scale(1.06); }
  66%  { transform: translate(-25px, 40px) scale(0.96); }
  100% { transform: translate(20px, 15px) scale(1.03); }
}

/* Noise overlay */
.bg-noise {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  background-size: 200px 200px;
}

/* ─────────────────────────────────────────
   NAV
───────────────────────────────────────── */
nav {
  position: sticky;
  top: 0;
  z-index: 50;
  height: var(--nav-h);
  padding: 0 var(--pad-x);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(7,7,14,0.78);
  backdrop-filter: blur(20px) saturate(1.4);
  -webkit-backdrop-filter: blur(20px) saturate(1.4);
  border-bottom: 1px solid var(--b-hair);
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--ff-display);
  font-weight: 800;
  font-size: 1.0625rem;
  letter-spacing: -0.03em;
  color: var(--t1);
}
.nav-logo-mark {
  width: 30px; height: 30px;
  border-radius: var(--r-icon);
  background: linear-gradient(135deg, var(--plasma) 0%, var(--ember) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 18px var(--plasma-glow);
  font-size: 0.8rem;
  font-weight: 900;
  color: #fff;
  flex-shrink: 0;
  letter-spacing: 0;
}
.nav-logo-dim { color: var(--t3); font-weight: 400; }

.nav-links {
  display: flex;
  align-items: center;
  gap: 28px;
  list-style: none;
}
.nav-links a {
  font-size: 0.8125rem;
  font-weight: 500;
  color: var(--t2);
  letter-spacing: 0.07em;
  text-transform: uppercase;
  position: relative;
  transition: color 250ms ease;
}
.nav-links a::after {
  content: '';
  position: absolute;
  bottom: -4px; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, var(--plasma), var(--ember));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 300ms var(--ease-spring);
}
.nav-links a:hover { color: var(--t1); }
.nav-links a:hover::after { transform: scaleX(1); }

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 9px 22px;
  border-radius: var(--r-pill);
  border: 1.5px solid var(--b-plasma);
  color: var(--t-plasma);
  background: var(--plasma-soft);
  font-size: 0.8125rem;
  font-weight: 600;
  letter-spacing: 0.02em;
  transition:
    background 280ms ease,
    border-color 280ms ease,
    box-shadow 280ms ease,
    transform 200ms var(--ease-spring);
}
.nav-cta:hover {
  background: rgba(123,79,255,0.20);
  border-color: rgba(123,79,255,0.65);
  box-shadow: 0 0 28px rgba(123,79,255,0.28);
  transform: translateY(-1px);
}

/* ─────────────────────────────────────────
   HERO
───────────────────────────────────────── */
#hero {
  position: relative;
  z-index: 2;
  min-height: calc(100svh - var(--nav-h));
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 80px var(--pad-x) 100px;
  overflow: hidden;
}

.hero-glow-ring {
  position: absolute;
  width: 800px; height: 800px;
  border-radius: 50%;
  border: 1px solid rgba(123,79,255,0.08);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}
.hero-glow-ring::before {
  content: '';
  position: absolute;
  inset: 60px;
  border-radius: 50%;
  border: 1px solid rgba(255,92,53,0.06);
}
.hero-glow-ring::after {
  content: '';
  position: absolute;
  inset: 130px;
  border-radius: 50%;
  border: 1px solid rgba(53,255,212,0.05);
}

.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 6px 16px;
  border-radius: var(--r-pill);
  border: 1px solid var(--b-plasma-s);
  background: var(--plasma-soft);
  margin-bottom: 32px;
}
.hero-eyebrow-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--plasma-b);
  box-shadow: 0 0 8px var(--plasma-glow);
  animation: blink 2.4s ease-in-out infinite;
}
@keyframes blink {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.3; }
}

.hero-title {
  font-family: var(--ff-display);
  font-weight: 800;
  font-size: clamp(3.2rem, 8vw, 7.5rem);
  line-height: 0.93;
  letter-spacing: -0.055em;
  color: var(--t1);
  margin-bottom: 12px;
}
.hero-title .the {
  display: block;
  color: var(--t3);
  font-weight: 400;
  font-size: 0.38em;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  font-family: var(--ff-mono);
  margin-bottom: 8px;
}
.hero-tagline {
  font-size: clamp(1rem, 2vw, 1.25rem);
  color: var(--t2);
  max-width: 520px;
  margin: 28px auto 0;
  line-height: 1.65;
  font-weight: 300;
}
.hero-tagline strong {
  color: var(--t1);
  font-weight: 600;
}

.hero-actions {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-top: 52px;
  flex-wrap: wrap;
}

.
