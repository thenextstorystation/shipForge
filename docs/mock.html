<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TheDeveloper — Cinematic Portfolio</title>
<meta name="description" content="A cinematic portfolio of apps crafted with precision, creativity, and obsessive polish." />
<meta property="og:title" content="TheDeveloper — Cinematic Portfolio" />
<meta property="og:description" content="10+ apps. One unforgettable journey." />
<meta property="og:type" content="website" />
<style>
/* ═══════════════════════════════════════════
   TOKENS & RESET
═══════════════════════════════════════════ */
:root {
  --void:        #020204;
  --deep:        #07070E;
  --surface:     #0D0D18;
  --elevated:    #121220;
  --glass:       rgba(255,255,255,0.025);
  --glass-s:     rgba(255,255,255,0.055);

  --plasma:      #7B4FFF;
  --plasma-dim:  #5C35CC;
  --plasma-b:    #9B6FFF;
  --plasma-glow: rgba(123,79,255,0.28);
  --plasma-soft: rgba(123,79,255,0.12);
  --ember:       #FF5C35;
  --ember-dim:   #CC3D20;
  --ember-b:     #FF7A5C;
  --ember-glow:  rgba(255,92,53,0.22);
  --aurora:      #35FFD4;
  --aurora-dim:  #20BFA0;
  --aurora-b:    #6EFFDF;
  --aurora-glow: rgba(53,255,212,0.18);
  --gold:        #E8C97A;

  --txt-1: #F0EEF8;
  --txt-2: #9B98B8;
  --txt-3: #6B6888;
  --txt-m: #3E3C58;
  --txt-plasma: #A07EFF;
  --txt-ember:  #FF7A5C;
  --txt-aurora: #6EFFDF;

  --br-hair:   rgba(255,255,255,0.04);
  --br-sub:    rgba(255,255,255,0.07);
  --br-def:    rgba(255,255,255,0.11);
  --br-str:    rgba(255,255,255,0.20);
  --br-plasma: rgba(123,79,255,0.38);
  --br-ember:  rgba(255,92,53,0.32);
  --br-aurora: rgba(53,255,212,0.28);

  --ff-display: 'Syne', system-ui, sans-serif;
  --ff-body:    'Inter', system-ui, sans-serif;
  --ff-mono:    'JetBrains Mono', 'Courier New', monospace;

  --r-sm:   8px;
  --r-md:   12px;
  --r-lg:   16px;
  --r-xl:   24px;
  --r-2xl:  32px;
  --r-card: 20px;
  --r-card-lg: 28px;
  --r-icon: 18px;
  --r-pill: 9999px;

  --ease-spring:    cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-cinema:    cubic-bezier(0.22, 1, 0.36, 1);
  --ease-standard:  cubic-bezier(0.16, 1, 0.3, 1);

  --nav-h: 72px;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; font-size:16px; }

body {
  background: var(--void);
  color: var(--txt-1);
  font-family: var(--ff-body);
  line-height: 1.6;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  cursor: none;
}

::-webkit-scrollbar { width:2px; }
::-webkit-scrollbar-track { background:var(--void); }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--plasma), var(--ember));
  border-radius: var(--r-pill);
}

img { display:block; max-width:100%; }
a { text-decoration:none; color:inherit; }
button { cursor:none; border:none; background:none; font:inherit; }

/* ═══════════════════════════════════════════
   CUSTOM CURSOR
═══════════════════════════════════════════ */
.cursor-dot {
  position:fixed; pointer-events:none; z-index:9999;
  width:8px; height:8px;
  background:var(--plasma);
  border-radius:50%;
  transform:translate(-50%,-50%);
  transition:
    width 300ms var(--ease-spring),
    height 300ms var(--ease-spring),
    background 300ms ease;
  mix-blend-mode:screen;
}
.cursor-ring {
  position:fixed; pointer-events:none; z-index:9998;
  width:40px; height:40px;
  border:1.5px solid rgba(123,79,255,0.50);
  border-radius:50%;
  transform:translate(-50%,-50%);
  transition:
    transform 180ms var(--ease-cinema),
    width 380ms var(--ease-spring),
    height 380ms var(--ease-spring),
    border-color 300ms ease,
    opacity 300ms ease;
}
body:has(a:hover) .cursor-dot,
body:has(button:hover) .cursor-dot { width:14px; height:14px; background:var(--ember); }
body:has(a:hover) .cursor-ring,
body:has(button:hover) .cursor-ring {
  width:60px; height:60px;
  border-color:rgba(255,92,53,0.45);
}

/* ═══════════════════════════════════════════
   PRELOADER
═══════════════════════════════════════════ */
#preloader {
  position:fixed; inset:0; z-index:1000;
  background:var(--void);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:36px;
  transition:
    opacity 900ms var(--ease-cinema),
    visibility 900ms;
}
#preloader.exit { opacity:0; visibility:hidden; }

.pl-wordmark {
  font-family:var(--ff-display);
  font-weight:800;
  font-size: clamp(2rem,5vw,3.2rem);
  letter-spacing:-0.05em;
  display:flex; align-items:baseline; gap:0;
  overflow:hidden;
}
.pl-the {
  color:var(--txt-3);
  display:inline-flex;
}
.pl-dev {
  background: linear-gradient(90deg,#A07EFF 0%,#FF7A5C 55%,#6EFFDF 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
  display:inline-flex;
  filter:drop-shadow(0 0 32px rgba(123,79,255,0.40));
}
.pl-char {
  display:inline-block;
  opacity:0;
  transform:translateY(40px) rotateX(60deg);
  animation: charIn 0.9s var(--ease-spring) forwards;
}
.pl-the .pl-char:nth-child(1){animation-delay:0.08s}
.pl-the .pl-char:nth-child(2){animation-delay:0.14s}
.pl-the .pl-char:nth-child(3){animation-delay:0.20s}
.pl-dev .pl-char:nth-child(1){animation-delay:0.30s}
.pl-dev .pl-char:nth-child(2){animation-delay:0.36s}
.pl-dev .pl-char:nth-child(3){animation-delay:0.42s}
.pl-dev .pl-char:nth-child(4){animation-delay:0.48s}
.pl-dev .pl-char:nth-child(5){animation-delay:0.54s}
.pl-dev .pl-char:nth-child(6){animation-delay:0.60s}
.pl-dev .pl-char:nth-child(7){animation-delay:0.66s}
.pl-dev .pl-char:nth-child(8){animation-delay:0.72s}
.pl-dev .pl-char:nth-child(9){animation-delay:0.78s}

@keyframes charIn {
  to { opacity:1; transform:translateY(0) rotateX(0); }
}

.pl-bar-wrap {
  width:220px; height:1px;
  background:var(--br-sub);
  border-radius:var(--r-pill);
  overflow:hidden;
  opacity:0;
  animation:fadeIn 400ms 0.5s ease forwards;
}
.pl-bar {
  height:100%;
  width:0;
  background:linear-gradient(90deg,var(--plasma),var(--ember),var(--aurora));
  border-radius:var(--r-pill);
  animation:barGrow 2.2s 0.5s var(--ease-cinema) forwards;
}
@keyframes barGrow { to { width:100%; } }

.pl-label {
  font-family:var(--ff-mono);
  font-size:0.65rem;
  letter-spacing:0.22em;
  text-transform:uppercase;
  color:var(--txt-m);
  opacity:0;
  animation:fadeIn 500ms 0.7s ease forwards;
}
@keyframes fadeIn { to { opacity:1; } }

.pl-dots {
  display:flex; gap:6px;
  opacity:0;
  animation:fadeIn 400ms 0.6s ease forwards;
}
.pl-dot {
  width:4px; height:4px;
  border-radius:50%;
  animation:dotPulse 1.4s ease-in-out infinite;
}
.pl-dot:nth-child(1){background:var(--plasma);animation-delay:0s}
.pl-dot:nth-child(2){background:var(--ember);animation-delay:0.2s}
.pl-dot:nth-child(3){background:var(--aurora);animation-delay:0.4s}
@keyframes dotPulse{
  0%,100%{opacity:0.25;transform:scale(0.8)}
  50%{opacity:1;transform:scale(1.4)}
}

/* ═══════════════════════════════════════════
   CANVAS BACKGROUND
═══════════════════════════════════════════ */
#bg-canvas {
  position:fixed; inset:0;
  z-index:0;
  pointer-events:none;
  opacity:0.55;
}

/* ═══════════════════════════════════════════
   NAV
═══════════════════════════════════════════ */
nav {
  position:fixed; top:0; left:0; right:0;
  height:var(--nav-h);
  z-index:50;
  padding:0 48px;
  display:flex; align-items:center; justify-content:space-between;
  background:linear-gradient(180deg,rgba(2,2,4,0.90) 0%,transparent 100%);
  transition:
    background 400ms ease,
    backdrop-filter 400ms ease,
    border-color 400ms ease;
  border-bottom:1px solid transparent;
}
nav.scrolled {
  background:rgba(7,7,14,0.82);
  backdrop-filter:blur(20px) saturate(1.5);
  border-color:var(--br-hair);
}

.nav-logo {
  font-family:var(--ff-display);
  font-weight:800;
  font-size:1.0625rem;
  letter-spacing:-0.025em;
  color:var(--txt-1);
  display:flex; align-items:center; gap:8px;
}
.nav-logo-mark {
  width:28px; height:28px;
  border-radius:var(--r-icon);
  background:linear-gradient(135deg,var(--plasma),var(--ember));
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 0 16px var(--plasma-glow);
  font-size:0.75rem;
  font-weight:800;
  color:#fff;
  flex-shrink:0;
}
.nav-logo-text { color:var(--txt-2); font-weight:400; }
.nav-logo-text b { color:var(--txt-1); font-weight:800; }

.nav-links {
  display:flex; align-items:center; gap:32px;
  list-style:none;
}
.nav-links a {
  font-size:0.8125rem;
  font-weight:500;
  color:var(--txt-2);
  letter-spacing:0.06em;
  text-transform:uppercase;
  position:relative;
  transition:color 250ms ease;
}
.nav-links a::after {
  content:'';
  position:absolute; bottom:-4px; left:0; right:0; height:1px;
  background:linear-gradient(90deg,var(--plasma),var(--ember));
  transform:scaleX(0); transform-origin:left;
  transition:transform 300ms var(--ease-spring);
}
.nav-links a:hover { color:var(--txt-1); }
.nav-links a:hover::after { transform:scaleX(1); }

.nav-cta {
  padding:9px 22px;
  border-radius:var(--r-pill);
  border:1.5px solid var(--br-plasma);
  color:var(--txt-plasma);
  background:var(--plasma-soft);
  font-size:0.8125rem;
  font-weight:600;
  letter-spacing:0.02em;
  transition:
    background 300ms ease,
    border-color 300ms ease,
    box-shadow 300ms ease,
    transform 200ms var(--ease-spring);
}
.nav-cta:hover {
  background:rgba(123,79,255,0.20);
  border-color:rgba(123,79,255,0.65);
  box-shadow:0 0 28px rgba(123,79,255,0.28);
  transform:translateY(-1px);
}

.nav-mobile-toggle { display:none; }

/* ═══════════════════════════════════════════
   HERO
═══════════════════════════════════════════ */
#hero {
  position:relative;
  min-height:100svh;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  text-align:center;
  padding:calc(var(--nav-h) + 60px) 48px 100px;
  overflow:hidden;
  z-index:1;
}
