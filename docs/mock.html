<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TheDeveloper — Cinematic Portfolio</title>
<meta name="description" content="A cinematic portfolio of apps crafted with precision, creativity, and obsessive polish." />
<meta property="og:title" content="TheDeveloper — Cinematic Portfolio" />
<meta property="og:description" content="10+ apps. One unforgettable journey." />
<meta property="og:type" content="website" />
<style>
/* ═══════════════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════════════ */
:root {
  --void:        #020204;
  --deep:        #07070E;
  --surface:     #0D0D18;
  --elevated:    #121220;
  --glass:       rgba(255,255,255,0.025);
  --glass-s:     rgba(255,255,255,0.055);

  --plasma:      #7B4FFF;
  --plasma-dim:  #5C35CC;
  --plasma-b:    #9B6FFF;
  --plasma-glow: rgba(123,79,255,0.28);
  --plasma-soft: rgba(123,79,255,0.12);
  --ember:       #FF5C35;
  --ember-b:     #FF7A5C;
  --ember-glow:  rgba(255,92,53,0.22);
  --ember-soft:  rgba(255,92,53,0.10);
  --aurora:      #35FFD4;
  --aurora-b:    #6EFFDF;
  --aurora-glow: rgba(53,255,212,0.18);
  --aurora-soft: rgba(53,255,212,0.08);
  --gold:        #E8C97A;
  --gold-glow:   rgba(232,201,122,0.20);

  --t1: #F0EEF8;
  --t2: #9B98B8;
  --t3: #6B6888;
  --tm: #3E3C58;
  --t-plasma: #A07EFF;
  --t-ember:  #FF7A5C;
  --t-aurora: #6EFFDF;
  --t-gold:   #E8C97A;

  --b-hair:     rgba(255,255,255,0.04);
  --b-sub:      rgba(255,255,255,0.07);
  --b-def:      rgba(255,255,255,0.11);
  --b-str:      rgba(255,255,255,0.20);
  --b-plasma:   rgba(123,79,255,0.38);
  --b-plasma-s: rgba(123,79,255,0.18);
  --b-ember:    rgba(255,92,53,0.32);
  --b-aurora:   rgba(53,255,212,0.28);
  --b-gold:     rgba(232,201,122,0.30);

  --ff-display: system-ui, -apple-system, 'Segoe UI', sans-serif;
  --ff-body:    system-ui, -apple-system, 'Segoe UI', sans-serif;
  --ff-mono:    'Courier New', Courier, monospace;

  --r-xs:      4px;
  --r-sm:      8px;
  --r-md:      12px;
  --r-lg:      16px;
  --r-xl:      24px;
  --r-2xl:     32px;
  --r-card:    20px;
  --r-card-lg: 28px;
  --r-icon:    18px;
  --r-pill:    9999px;

  --nav-h:  72px;
  --pad-x:  clamp(20px, 5vw, 80px);

  --ease-spring:   cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-cinema:   cubic-bezier(0.22, 1, 0.36, 1);
  --ease-standard: cubic-bezier(0.16, 1, 0.3, 1);
}

/* ═══════════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }
body {
  background: var(--void);
  color: var(--t1);
  font-family: var(--ff-body);
  line-height: 1.6;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: var(--void); }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, var(--plasma), var(--ember));
  border-radius: var(--r-pill);
}
a { text-decoration: none; color: inherit; }
button { border: none; background: none; font: inherit; color: inherit; cursor: pointer; }
img { display: block; max-width: 100%; }

/* ═══════════════════════════════════════════════════
   AMBIENT BACKGROUND — fixed orbs + mesh
═══════════════════════════════════════════════════ */
.bg-scene {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  overflow: hidden;
}

/* Main gradient mesh */
.bg-mesh {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 10%,  rgba(123,79,255,0.18) 0%, transparent 55%),
    radial-gradient(ellipse 60% 50% at 85% 25%,  rgba(255,92,53,0.12)  0%, transparent 50%),
    radial-gradient(ellipse 70% 55% at 55% 80%,  rgba(53,255,212,0.09) 0%, transparent 50%),
    radial-gradient(ellipse 50% 40% at 10% 75%,  rgba(232,201,122,0.07)0%, transparent 45%),
    var(--void);
}

/* Animated drifting orbs */
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(72px);
  will-change: transform;
}
.orb-1 {
  width: 680px; height: 680px;
  background: radial-gradient(circle, rgba(123,79,255,0.55) 0%, transparent 70%);
  top: -200px; left: -150px;
  animation: orbDrift1 24s ease-in-out infinite alternate;
}
.orb-2 {
  width: 520px; height: 520px;
  background: radial-gradient(circle, rgba(255,92,53,0.45) 0%, transparent 70%);
  top: 15%; right: -120px;
  animation: orbDrift2 19s ease-in-out infinite alternate;
}
.orb-3 {
  width: 480px; height: 480px;
  background: radial-gradient(circle, rgba(53,255,212,0.30) 0%, transparent 70%);
  bottom: 10%; left: 20%;
  animation: orbDrift3 27s ease-in-out infinite alternate;
}
.orb-4 {
  width: 360px; height: 360px;
  background: radial-gradient(circle, rgba(232,201,122,0.25) 0%, transparent 70%);
  bottom: 0; right: 10%;
  animation: orbDrift4 21s ease-in-out infinite alternate;
}
.orb-5 {
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(123,79,255,0.35) 0%, transparent 70%);
  top: 50%; left: 48%;
  animation: orbDrift1 31s ease-in-out infinite alternate;
  animation-delay: -8s;
}

@keyframes orbDrift1 {
  0%   { transform: translate(0,0) scale(1); }
  40%  { transform: translate(60px,-40px) scale(1.08); }
  75%  { transform: translate(-30px,55px) scale(0.94); }
  100% { transform: translate(35px,20px) scale(1.04); }
}
@keyframes orbDrift2 {
  0%   { transform: translate(0,0) scale(1); }
  35%  { transform: translate(-50px,35px) scale(1.06); }
  70%  { transform: translate(45px,-50px) scale(0.92); }
  100% { transform: translate(-20px,15px) scale(1.02); }
}
@keyframes orbDrift3 {
  0%   { transform: translate(0,0) scale(1); }
  50%  { transform: translate(40px,-60px) scale(1.10); }
  100% { transform: translate(-55px,30px) scale(0.96); }
}
@keyframes orbDrift4 {
  0%   { transform: translate(0,0) scale(1); }
  45%  { transform: translate(-35px,-25px) scale(1.05); }
  100% { transform: translate(50px,40px) scale(0.97); }
}

/* Subtle grid overlay */
.bg-grid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 64px 64px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 100%);
}

/* Vignette */
.bg-vignette {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 100% 100% at 50% 50%, transparent 40%, rgba(2,2,4,0.75) 100%);
}

/* ═══════════════════════════════════════════════════
   PAGE WRAPPER
═══════════════════════════════════════════════════ */
.page {
  position: relative;
  z-index: 1;
}

/* ═══════════════════════════════════════════════════
   NAV
═══════════════════════════════════════════════════ */
.nav {
  position: sticky;
  top: 0;
  z-index: 50;
  height: var(--nav-h);
  padding: 0 var(--pad-x);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(7,7,14,0.80);
  backdrop-filter: blur(20px) saturate(1.5);
  -webkit-backdrop-filter: blur(20px) saturate(1.5);
  border-bottom: 1px solid var(--b-hair);
  animation: navReveal 0.8s var(--ease-cinema) both;
}
@keyframes navReveal {
  from { opacity: 0; transform: translateY(-12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--ff-display);
  font-weight: 800;
  font-size: 1.0625rem;
  letter-spacing: -0.03em;
  color: var(--t1);
}
.nav-logo-mark {
  width: 32px; height: 32px;
  border-radius: var(--r-icon);
  background: linear-gradient(135deg, var(--plasma) 0%, var(--ember) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 20px var(--plasma-glow), 0 0 40px rgba(123,79,255,0.14);
  font-size: 0.75rem;
  font-weight: 900;
  color: #fff;
  letter-spacing: 0;
  flex-shrink: 0;
  animation: logoPulse 4s ease-in-out infinite;
}
@keyframes logoPulse {
  0%,100% { box-shadow: 0 0 20px var(--plasma-glow), 0 0 40px rgba(123,79,255,0.14); }
  50%     { box-shadow: 0 0 30px rgba(123,79,255,0.45), 0 0 60px rgba(123,79,255,0.20); }
}
.nav-logo-dim { color: var(--t3); font-weight: 400; }

.nav-links {
  display: flex;
  align-items: center;
  gap: 32px;
  list-style: none;
}
.nav-links a {
  font-size: 0.8125rem;
  font-weight: 500;
  color: var(--t2);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  position: relative;
  transition: color 250ms ease;
}
.nav-links a::after {
  content: '';
  position: absolute;
  bottom: -4px; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, var(--plasma), var(--ember));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 300ms var(--ease-spring);
}
.nav-links a:hover { color: var(--t1); }
.nav-links a:hover::after { transform: scaleX(1); }

.nav-cta {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 9px 22px;
  border-radius: var(--r-pill);
  border: 1.5px solid var(--b-plasma);
  color: var(--t-plasma);
  background: var(--plasma-soft);
  font-size: 0.8125rem;
  font-weight: 600;
  letter-spacing: 0.02em;
  transition: background 280ms ease, border-color 280ms ease, box-shadow 280ms ease, transform 200ms var(--ease-spring);
}
.nav-cta:hover {
  background: rgba(123,79,255,0.22);
  border-color: rgba(123,79,255,0.65);
  box-shadow: 0 0 28px rgba(123,79,255,0.30);
  transform: translateY(-1px);
}

/* ═══════════════════════════════════════════════════
   HERO
═══════════════════════════════════════════════════ */
#hero {
  position: relative;
  min-height: calc(100svh - var(--nav-h));
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 80px var(--pad-x) 120px;
  overflow: hidden;
}

/* Concentric glow rings */
.hero-rings {
  position: absolute;
  width: 900px; height: 900px;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}
.hero-ring {
  position: absolute;
  border-radius: 50%;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  animation: ringRotate linear infinite;
}
.hero-ring-1 {
  width: 650px; height: 650px;
  border: 1px solid rgba(123,79,255,0.10);
  animation-duration: 60s;
}
.hero-ring-2 {
  width: 480px; height: 480px;
  border: 1px solid rgba(255,92,53,0.08);
  animation-duration: 45s;
  animation-direction: reverse;
}
.hero-ring-3 {
  width: 320px; height: 320px;
  border: 1px solid rgba(53,255,212,0.07);
  animation-duration: 35s;
}
.hero-ring-1::before,
.hero-ring-2::before,
.hero-ring-3::before {
  content: '';
  position: absolute;
  width: 6px; height: 6px;
  border-radius: 50%;
  top: -3px; left: 50%;
  transform: translateX(-50%);
}
.hero-ring-1::before { background: var(--plasma-b); box-shadow: 0 0 12px var(--plasma); }
.hero-ring-2::before { background: var(--ember-b);  box-shadow: 0 0 12px var(--ember);  }
.hero-ring-3::before { background: var(--aurora-b); box-shadow: 0 0 12px var(--aurora); }
@keyframes ringRotate {
  from { transform: translate(-50%, -50%) rotate(0deg); }
  to   { transform: translate(-50%, -50%) rotate(360deg); }
}

/* Radial spotlight behind title */
.hero-spotlight {
  position: absolute;
  width: 700px; height: 400px;
  top: 50%; left: 50%;
  transform: translate(-50%, -60%);
  background: radial-gradient(ellipse, rgba(123,79,255,0.18) 0%, transparent 70%);
  pointer-events: none;
  animation: spotBreath 6s ease-in-out infinite alternate;
}
@keyframes spotBreath {
  from { opacity: 0.7; transform: translate(-50%, -60%) scale(1); }
  to   { opacity: 1;   transform: translate(-50%, -60%) scale(1.15); }
}

.hero-content {
  position: relative;
  z-index: 2;
}

.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 6px 18px;
  border-radius: var(--r-pill);
  border: 1px solid var(--b-plasma-s);
  background: var(--plasma-soft);
  margin-bottom: 36px;
  animation: fadeSlideUp 0.9s 0.1s var(--ease-cinema) both;
}
.hero-eyebrow-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--plasma-b);
  box-shadow: 0 0 10px var(--plasma-glow);
  animation: blink 2.4s ease-in-out infinite;
}
.hero-eyebrow-text {
  font-family: var(--ff-mono);
  font-size: 0.6875rem;
  font-weight: 500;
  letter-spacing: 0.20em;
  text-transform: uppercase;
  color: var(--t3);
}
@keyframes blink {
  0%,100% { opacity: 1; }
  50%     { opacity: 0.25; }
}

.hero-title {
  font-family: var(--ff-display);
  font-weight: 800;
  font-size: clamp(
